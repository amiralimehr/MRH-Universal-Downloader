name: MRH Universal Downloader v1.0.1

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install yt-dlp
      run: |
        pip install --upgrade pip
        pip install yt-dlp
        yt-dlp --version

    - name: Run Downloader
      run: python3 scripts/mrh_downloader.py

    - name: Commit files
      run: |
        git config user.name "MRH Bot"
        git config user.email "bot@local"
        git add downloads/ || true
        git diff --staged --quiet || git commit -m "MRH: Add downloads [skip ci]"
        git push || true
